api_platform:
    title: 'Orkestria API'
    version: '1.0.0'
    defaults:
        stateless: true
        cache_headers:
            vary: ['Content-Type', 'Authorization', 'Origin']
    formats:
        jsonld: ['application/ld+json']
        json: ['application/json']
    error_formats:
        jsonproblem: ['application/problem+json']
        jsonld: ['application/ld+json']
